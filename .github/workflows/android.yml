name: RF Explorer Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build & Test RF Explorer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local environment config
        run: |
          if [ ! -f .env.example ]; then
            echo "GEMINI_API_KEY=PLACEHOLDER_KEY" > .env.example
          fi

      - name: Run Unit Tests & Robolectric Verification
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rf-explorer-ultimate-ai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
